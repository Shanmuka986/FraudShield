name: Daily ETL

on:
  schedule:
    - cron: '30 0 * * *'

  workflow_dispatch:

jobs:
  run-etl:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        run: python main.py